services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: zhuguan
      POSTGRES_PASSWORD: zhuguan_dev
      POSTGRES_DB: zhuguan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhuguan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
